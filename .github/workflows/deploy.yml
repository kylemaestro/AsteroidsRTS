name: Deploy to GitHub Pages

# Build the applet jar from source and publish the static site to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Build AsteroidsRTS.jar
        run: |
          mkdir -p build
          javac -d build src/*.java
          jar cf AsteroidsRTS.jar -C build .

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html AsteroidsRTS.jar site/
          # Custom domain for GitHub Pages
          cp CNAME site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
